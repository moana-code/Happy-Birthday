<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday</title>
<audio id="ringtone" loop>
    <source src="sound.mp3" type="audio/mpeg">
</audio>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.iphone{
width:320px;
height:650px;
background:#111;
border-radius:45px;
padding:18px;
border:4px solid #333;
box-shadow:0 0 45px rgba(255,255,255,.10);
position:relative;
overflow:hidden;
}

.notch{
width:140px;
height:30px;
background:#000;
border-radius:20px;
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
z-index:10;
}

.screen{
width:100%;
height:100%;
border-radius:35px;
overflow:hidden;
position:relative;
background:linear-gradient(180deg,#4b2929,#120909);
}

.call-screen,
.info-screen{
position:absolute;
width:100%;
height:100%;
display:flex;
flex-direction:column;
align-items:center;
padding:30px;
}

.call-screen{
padding-top:85px;
text-align:center;
}

.avatar{
width:165px;
height:165px;
border-radius:50%;
background:url('img.png') center/cover;
border:5px solid rgba(255,255,255,.35);
box-shadow:0 0 35px rgba(255,255,255,.10);
margin-bottom:25px;
}

.title{
font-size:34px;
font-weight:300;
color:white;
margin-bottom:10px;
}

.name{
font-size:18px;
color:rgba(255,255,255,.75);
margin-bottom:8px;
}

.birthday{
font-size:20px;
color:#f6c7c7;
}

.slide-container{
width:100%;
margin-top:75px;
}

.slide-track{
position:relative;
width:100%;
height:70px;
border-radius:50px;
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.15);
overflow:hidden;
}

.slide-text{
position:absolute;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
padding-left:45px;
color:rgba(255,255,255,.60);
font-size:14px;
}

.slide-button{
width:62px;
height:62px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
color:white;
position:absolute;
top:4px;
left:4px;
cursor:pointer;
z-index:10;
user-select:none;
transition:.2s;
box-shadow:0 5px 18px rgba(0,0,0,.35);
}

.info-screen{
display:none;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(180deg,#f7eadf,#fff8f3);
}

.card{
background:white;
padding:26px;
border-radius:30px;
width:100%;
box-shadow:0 10px 30px rgba(0,0,0,.12);
}

.mini-avatar{
width:95px;
height:95px;
border-radius:50%;
background:url('img.png') center/cover;
margin:auto;
margin-bottom:18px;
border:4px solid white;
box-shadow:0 5px 15px rgba(0,0,0,.18);
}

.card h2{
font-size:30px;
margin-bottom:12px;
color:#b30000;
font-family:Georgia,serif;
}

.mensagem{
font-size:16px;
line-height:1.6;
color:#666;
margin-bottom:15px;
}

.info{
font-size:16px;
line-height:1.7;
color:#333;
margin-bottom:12px;
}

.botoes{
display:flex;
gap:12px;
justify-content:center;
margin-top:22px;
}

.aceito,
.recusar{
border:none;
padding:13px 22px;
border-radius:50px;
color:white;
font-size:15px;
cursor:pointer;
}

@keyframes Aceitar{
0% {background: #3fa13f; }
100% {background: white; }
}
@keyframes Recusar{
0% {background: #e0503a; }
100% {background: white; }
}

.aceito{
background:#3fa13f;
opacity: 1.0;
}

.aceito:hover{
  background: white;
  color: black;
  animation: Aceitar 1s; 
border: 1px solid black;
}

.recusar{
background:#e0503a;
opacity: 2.0;
}
.recusar:hover{
  background: white;
  color: black;
 animation: Recusar 1s; 
border: 1px solid black;
}
.butterflies{
position:absolute;
inset:0;
overflow:hidden;
pointer-events:none;
z-index:1;
}

.butterflies span{
position:absolute;
font-size:24px;
animation: voar 8s linear infinite;
opacity:.85;
}

.butterflies span:nth-child(1){left:10%; animation-delay:0s;}
.butterflies span:nth-child(2){left:25%; animation-delay:1s;}
.butterflies span:nth-child(3){left:40%; animation-delay:2s;}
.butterflies span:nth-child(4){left:55%; animation-delay:.5s;}
.butterflies span:nth-child(5){left:70%; animation-delay:1.5s;}
.butterflies span:nth-child(6){left:85%; animation-delay:2.5s;}
.butterflies span:nth-child(7){left:15%; animation-delay:3s;}
.butterflies span:nth-child(8){left:65%; animation-delay:3.5s;}

@keyframes voar{
0%{
bottom:-40px;
transform:translateX(0) rotate(0deg) scale(.8);
}
50%{
transform:translateX(35px) rotate(20deg) scale(1.1);
}
100%{
bottom:105%;
transform:translateX(-25px) rotate(-20deg) scale(.9);
}
}

.info-screen .card{
position:relative;
z-index:2;
}

</style>
</head>

<body>

<div class="iphone">
<div class="notch"></div>

<div class="screen">

<div class="call-screen" id="callScreen">

<div class="avatar"></div>

<h1 class="title">Moana Carvalho</h1>

<p class="name">is calling you...</p>

<p class="birthday">Happy Birthday 🎉</p>

<div class="slide-container">
<div class="slide-track" id="slideTrack">

<div class="slide-button" id="slider">📞</div>

<div class="slide-text">Slide to answer</div>

</div>
</div>

</div>

<div class="info-screen" id="infoScreen">
<div class="butterflies">
  <span>💌</span><span>🦋</span><span>💌</span><span>🦋</span>
  <span>💌</span><span>🦋</span><span>💌</span><span>🦋</span>
</div>

<div class="card">

<div class="mini-avatar"></div>

<h2>Coffee Break ☕</h2>

<p class="mensagem">
Um café. Risadas. Você.     
</p>

<p class="info">
📍 Donna Doceria<br>
Rua 12, Vicente Pires
</p>

<p class="info">
📅 June 20<br>
⏰ 09:00 AM
</p>

<div class="botoes">

<button class="aceito" id="botaoWhatsapp">
Aceitar
</button>

<button class="recusar" onclick="voltar()">
Recusar
</button>

</div>

</div>
</div>

</div>
</div>

<script>
const linkWhatsapp =
"https://wa.me/5561983740385?text=Aceitei%20o%20convite%20para%20o%20café%20";

document.getElementById("botaoWhatsapp").onclick = () => {
window.open(linkWhatsapp);
};

const slider = document.getElementById("slider");
const track = document.getElementById("slideTrack");
const ringtone = document.getElementById("ringtone");
let tocou = false;

let segurando = false;

slider.addEventListener("mousedown", iniciarChamada);
slider.addEventListener("touchstart", iniciarChamada);

function iniciarChamada(){

segurando = true;

if(!tocou){
    ringtone.play();
    tocou = true;
}

}

document.addEventListener("mousemove", mover);
document.addEventListener("touchmove", mover);

document.addEventListener("mouseup", soltar);
document.addEventListener("touchend", soltar);

function mover(e){
if(!segurando)return;

const x = e.touches ? e.touches[0].clientX : e.clientX;
const rect = track.getBoundingClientRect();

let pos = x - rect.left - 30;
const limite = track.offsetWidth - slider.offsetWidth - 4;

if(pos < 4) pos = 4;
if(pos > limite) pos = limite;

slider.style.left = pos + "px";

if(pos >= limite - 5){
atender();
}
}

function soltar(){
segurando = false;
slider.style.left = "4px";
}

function atender(){

ringtone.pause();
ringtone.currentTime = 0;

document.getElementById("callScreen").style.display = "none";
document.getElementById("infoScreen").style.display = "flex";
}

function voltar(){
document.getElementById("infoScreen").style.display = "none";
document.getElementById("callScreen").style.display = "flex";
}
</script>

</body>
</html>
