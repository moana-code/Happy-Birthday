<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>iPhone Convite</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background:#000;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .iphone{
      width:320px;
      height:650px;
      background:#1a1a1a;
      border-radius:45px;
      padding:18px;
      border:4px solid #444;
      box-shadow:0 0 40px rgba(255,255,255,0.08);
      position:relative;
      overflow:hidden;
    }

    .notch{
      width:140px;
      height:30px;
      background:#000;
      border-radius:20px;
      position:absolute;
      top:10px;
      left:50%;
      transform:translateX(-50%);
      z-index:10;
    }

    .screen{
      width:100%;
      height:100%;
      border-radius:35px;
      overflow:hidden;
      position:relative;
      background:#efe3d3;
      color:#4b2e2e;
    }

    .call-screen,
    .info-screen{
      position:absolute;
      width:100%;
      height:100%;
      top:0;
      left:0;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:25px;
      transition:0.5s;
    }

    .info-screen{
      display:none;
      text-align:center;
      background:#efe3d3;
    }

    /* FOTO */
    .avatar{
      width:170px;
      height:170px;
      border-radius:50%;
      border:5px solid rgba(255,255,255,0.7);

      /* SUA FOTO */
      background:url('sua-foto.png') center/cover;

      margin-bottom:25px;
      box-shadow:0 0 25px rgba(0,0,0,0.25);
    }

    h1{
      font-size:32px;
      margin-bottom:10px;
      color:#b30000;
      font-family: Georgia, serif;
    }

    p{
      margin-bottom:25px;
      font-size:18px;
    }

    .buttons{
      position:absolute;
      bottom:60px;
      width:100%;
      display:flex;
      justify-content:space-evenly;
      padding:0 30px;
    }

    .btn{
      width:78px;
      height:78px;
      border-radius:50%;
      border:none;
      cursor:pointer;
      font-size:30px;
      color:white;
      transition:0.3s;
      box-shadow:0 5px 15px rgba(0,0,0,0.3);
    }

    .btn:hover{
      transform:scale(1.08);
    }

    .accept{
      background:#28c840;
    }

    .decline{
      background:#ff1744;
    }

    .card{
      background:rgba(255,255,255,0.45);
      padding:28px;
      border-radius:28px;
      box-shadow:0 8px 20px rgba(0,0,0,0.12);
      width:100%;
      backdrop-filter:blur(5px);
    }

    .card h2{
      margin-bottom:20px;
      font-size:34px;
      color:#b30000;
      font-family: Georgia, serif;
    }

    .card p{
      font-size:18px;
      line-height:1.8;
      color:#3a2a2a;
    }

    .desligar{
      margin-top:35px;
      background:#c40000;
      border:none;
      padding:15px 35px;
      border-radius:40px;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    .desligar:hover{
      transform:scale(1.05);
      background:#e00000;
    }

  </style>
</head>

<body>

  <div class="iphone">

    <div class="notch"></div>

    <div class="screen">

      <!-- TELA DA LIGAÇÃO -->
      <div class="call-screen" id="callScreen">

        <div class="avatar"></div>

        <h1>Happy Birthday</h1>

        <p>Moana is calling...</p>

        <div class="buttons">

          <button class="btn decline">
            ✕
          </button>

          <button class="btn accept" onclick="atender()">
            📞
          </button>

        </div>

      </div>

      <!-- TELA DO CONVITE -->
      <div class="info-screen" id="infoScreen">

        <div class="card">

          <h2>☕ Breakfast Invitation</h2>

          <p>
            📍 Donna Doceria<br>
            Rua 12, Vicente Pires
          </p>

          <p>
            📅 June 20<br>
            ⏰ 09:00 AM
          </p>

          <button class="desligar" onclick="desligar()">
            End Call
          </button>

        </div>

      </div>

    </div>
  </div>

  <script>

    function atender(){
      document.getElementById("callScreen").style.display = "none";
      document.getElementById("infoScreen").style.display = "flex";
    }

    function desligar(){
      document.getElementById("infoScreen").style.display = "none";
      document.getElementById("callScreen").style.display = "flex";
    }

  </script>

</body>
</html>
